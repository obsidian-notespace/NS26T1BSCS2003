mance benefits of caching."

uery parameters and fragments are allowed; they do not create new resources.<br><strong>Key takeaway:</strong> Avoid URI aliases for the same resource; it breaks REST's uniform identification."

d for safe, idempotent, read‑only operations.<br>* POST is for non‑idempotent, state‑changing operations or resource creation.<br>* For complex queries that don't fit in URI, alternatives include using GET with `Accept` header, or using a `SEARCH` method (WebDAV).<br><strong>Key takeaway:</strong> Using POST for search is a pragmatic trade‑off but not strictly RESTful."

                "detailed": "<strong>Step-by-step solution:</strong><br>1. HTTP status codes are part of the uniform interface's self‑descriptive messages.<br>2. Caches, proxies, and clients use status codes to determine success, failure, caching behaviour, etc.<br>3. Returning 200 for errors misleads these components. For example, a cache would store an error response as a successful response.<br>4. Option A (Statelessness) – not directly violated; statelessness is about server‑stored state.<br>5. Option B (Uniform Interface) – correct; status codes are a key part of the uniform interface.<br>6. Option C (Cacheability) – error responses could be cached, but that's not the primary violation.<br>7. Option D (Layered System) – proxies do rely on status codes, so this design would break layering, but the root is uniform interface.<br><br><strong>Why the correct answer is correct:</strong><br>HTTP status codes are not optional; they are a mandatory part of the uniform interface. Using 200 for errors is a common anti‑pattern that breaks REST semantics.<br><br><strong>Why other options are incorrect:</strong><br>* Option A: Statelessness is not about status codes.<br>* Option C: Error responses can be cacheable with appropriate headers; the violation is using 200.<br>* Option D: Layered System is affected, but the direct violation is uniform interface.<br><br><strong>How to approach this type of problem:</strong><br>Always use appropriate HTTP status codes. 200 means success; 4xx/5xx for errors. Never put the real status code only in the body.<br><br><strong>Concept used:</strong> Uniform Interface – HTTP status codes.<br><strong>Points to remember:</strong><br>* 200 OK – success, response body contains data.<br>* 400 Bad Request – client error.<br>* 404 Not Found – resource missing.<br>* 500 Internal Server Error – server error.<br>* Using 200 for errors breaks REST.<br><strong>Key takeaway:</strong> Status codes are not decorative; they are functional."

                "detailed": "<strong>Step-by-step solution:</strong><br>1. Idempotency means that making the same request multiple times has the same effect as making it once.<br>2. Option A (POST idempotent if server assigns unique ID) – false; even with unique IDs, the server would create multiple resources with different IDs, so effect is not the same. Idempotency keys can make POST idempotent, but that's not 'server assigns ID'.<br>3. Option B (PUT idempotent) – correct; sending the same PUT request twice replaces the resource with the same data, final state unchanged.<br>4. Option C (DELETE not idempotent) – false; DELETE is idempotent. Deleting a resource that doesn't exist is still a successful deletion (the final state is 'deleted'). The server may return 404 on second attempt, but the effect (resource deleted) is the same.<br>5. Option D (GET not idempotent) – false; GET is idempotent even if the representation changes over time. Idempotency is about side effects, not about the response content. GET has no side effects, so it's idempotent.<br><br><strong>Why the correct answer is correct:</strong><br>PUT semantics ensure that repeating the same request does not create duplicates or change the state beyond the first application.<br><br><strong>Why other options are incorrect:</strong><br>* Option A: POST without idempotency key is not idempotent.<br>* Option C: DELETE is idempotent; the second request has no further effect.<br>* Option D: GET is idempotent (no side effects).<br><br><strong>How to approach this type of problem:</strong><br>Idempotency = side effects of repeated requests are the same as a single request. It does not mean the response is the same.<br><br><strong>Concept used:</strong> Idempotency of HTTP methods.<br><strong>Points to remember:</strong><br>* Safe methods (GET, HEAD, OPTIONS) are idempotent.<br>* PUT and DELETE are idempotent.<br>* POST is not idempotent (unless using idempotency key).<br>* PATCH is not guaranteed idempotent.<br><strong>Key takeaway:</strong> PUT and DELETE are idempotent; POST is not."

                "detailed": "<strong>Step-by-step solution:</strong><br>1. Caching uses the full URI as the primary cache key, but `Vary` adds additional headers to the key.<br>2. `Accept-Encoding` indicates which compression algorithms the client supports (gzip, deflate, br, identity).<br>3. A server may return a compressed response for `Accept-Encoding: gzip` and an uncompressed response for `Accept-Encoding: identity`.<br>4. `Vary: Accept-Encoding` ensures that caches store these as separate entries, preventing a gzip response from being served to a client that cannot decompress it.<br>5. Option A (caches must store separate copies) – correct.<br>6. Option B (force gzip) – false; it does not force encoding.<br>7. Option C (disable caching) – false; it enables correct caching.<br>8. Option D (encoding varies over time) – false.<br><br><strong>Why the correct answer is correct:</strong><br>Without `Vary`, a cache might serve a gzip‑compressed response to a client that didn't request gzip, causing parsing errors. `Vary` prevents that.<br><br><strong>Why other options are incorrect:</strong><br>* Option B: `Vary` does not force encoding; it only affects caching.<br>* Option C: It does not disable caching; it makes caching correct.<br>* Option D: Variation is based on request header, not time.<br><br><strong>How to approach this type of problem:</strong><br>`Vary` is about cache key composition. It tells caches to consider additional headers.<br><br><strong>Concept used:</strong> HTTP caching – `Vary` header.<br><strong>Points to remember:</strong><br>* `Vary: *` means the response varies on everything – effectively disables caching.<br>* `Vary: Accept, Accept-Language` is common for content negotiation.<br>* Without `Vary`, caches may serve wrong representations.<br><strong>Key takeaway:</strong> Use `Vary` to ensure correct caching of negotiated responses."
